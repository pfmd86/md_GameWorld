<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tell the Time! ⏰</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  :root {
    --bg-sky-top: #2EC4B6; --bg-sky-mid: #74D8D0; --bg-split: 58%;
    --theme-primary: #2EC4B6; --theme-secondary: #1A936F;
    --teal: #2EC4B6; --teal2: #1A936F;
  }

  /* Time game uses teal progress bar */
  .progress-bar-fill { background: linear-gradient(90deg,var(--teal),var(--teal2)); }
  /* Time game answer button 2 has teal theme */
  .answer-btn:nth-child(2) { background: #F0FFFE; border-color: #B0EEEA; color: #0d7a73; }
  /* Time play-again uses teal gradient */
  .play-again-btn { background: linear-gradient(135deg,var(--teal),var(--teal2)); box-shadow: 0 6px 20px rgba(46,196,182,.4); }
  .game-container { max-width: 520px; }

  /* ── Clock area ── */
  .clock-area { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 0 2px; }
  .clock-wrap { position: relative; display: inline-block; }
  .clock-svg {
    width: clamp(130px,36vw,190px); height: clamp(130px,36vw,190px);
    filter: drop-shadow(0 6px 16px rgba(0,0,0,.15)); animation: clockIn .4s ease both;
  }
  @keyframes clockIn {
    0%   { transform: scale(.7) rotate(-15deg); opacity: 0; }
    80%  { transform: scale(1.05) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .clock-hint { font-size: .72rem; color: #bbb; font-weight: 700; letter-spacing: .5px; margin-top: 2px; }

  /* ── Question label ── */
  .q-label { font-size: .72rem; color: #aaa; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 1px; flex-shrink: 0; }
  .q-text  { font-family: 'Baloo 2', sans-serif; font-size: clamp(1rem,3.5vw,1.4rem); color: #444; font-weight: 700; margin-bottom: 4px; flex-shrink: 0; }

  /* answers top margin for time game */
  .answers { margin-top: 4px; }
</style>
</head>
<body>

<div class="bg-scene"></div>
<div class="sun"></div>
<div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>

<header>
  <h1>⏰ Tell the Time!</h1>
  <div class="subtitle" id="headerSub">What time does the clock show? 🕐</div>
</header>

<div class="score-area">
  <div class="score-pill">⭐ Score: <span id="score">0</span></div>
  <div class="score-pill" id="bestPill">🏆 Best: <span id="best">0</span></div>
</div>

<div class="toggles-area">
  <button class="settings-btn" id="btnHome">🏠 Menu</button>
  <button class="settings-btn" id="btnOpenSettings">⚙️ Settings</button>
  <button class="mode-btn" id="btnEndless">🔟 10 Rounds</button>
</div>

<div class="game-container">
  <div class="stars-bar" id="starsBar"></div>

  <div class="question-card" id="questionCard">
    <div class="progress-text" id="progressText">Question 1 of 10</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>

    <div class="clock-area">
      <div class="clock-wrap">
        <svg class="clock-svg" id="clockSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- Clock face -->
          <circle cx="100" cy="100" r="96" fill="white" stroke="#e8e8e8" stroke-width="4"/>
          <circle cx="100" cy="100" r="90" fill="#FAFFFE"/>
          <!-- Tick marks -->
          <g id="ticks"></g>
          <!-- Hour numbers -->
          <g id="nums"></g>
          <!-- Hour hand -->
          <line id="hourHand" x1="100" y1="100" x2="100" y2="42" stroke="#333" stroke-width="7" stroke-linecap="round"/>
          <!-- Minute hand -->
          <line id="minHand"  x1="100" y1="100" x2="100" y2="28" stroke="#2EC4B6" stroke-width="5" stroke-linecap="round"/>
          <!-- Center dot -->
          <circle cx="100" cy="100" r="6" fill="#333"/>
          <circle cx="100" cy="100" r="3" fill="white"/>
        </svg>
      </div>
      <div class="clock-hint" id="clockHint">What time is it?</div>
    </div>

    <div class="q-label" id="qLabel">Pick the right time</div>

    <div class="answers">
      <button class="answer-btn" id="btn0"></button>
      <button class="answer-btn" id="btn1"></button>
      <button class="answer-btn" id="btn2"></button>
    </div>

    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">Next! ➡️</button>
  </div>

  <div class="end-screen" id="endScreen">
    <div style="font-size:5rem;margin-bottom:8px">🎉</div>
    <h2>Well done!</h2>
    <div class="end-score" id="endScore"></div>
    <button class="play-again-btn" id="playAgainBtn">Play Again! 🔄</button>
  </div>
</div>

<!-- Settings -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-box">
    <h2>⚙️ Settings</h2>
    <div class="s-section">
      <div class="s-label">Difficulty</div>
      <div class="s-row" id="sDiff">
        <button class="s-opt active" data-diff="hour">🕐 Hours only</button>
        <button class="s-opt" data-diff="half">🕧 Half hours</button>
        <button class="s-opt" data-diff="quarter">🕜 Quarters</button>
        <button class="s-opt" data-diff="five">⏱ 5 minutes</button>
      </div>
    </div>
    <div class="s-section">
      <div class="s-label">Rounds</div>
      <div class="s-row" id="sRounds">
        <button class="s-opt" data-rounds="5">5</button>
        <button class="s-opt active" data-rounds="10">10</button>
        <button class="s-opt" data-rounds="20">20</button>
        <button class="s-opt" data-rounds="0">♾️ Endless</button>
      </div>
    </div>
    <button class="s-close" id="settingsDoneBtn">Done ✓</button>
  </div>
</div>

<script src="../js/time_game.js"></script>

<footer><a href="https://games.mathiasdenzin.com">🎮 games.mathiasdenzin.com</a></footer>
</body>
</html>
